; DESi example configuration.
;
; Copy this file to config/desi.local.ini and fill in your keys there.
; NEVER put real API keys in this example file (it is committed to git).
; config/desi.local.ini is gitignored and is the only place keys belong.
;
; ENV variables always override these values, e.g.:
;   OPENROUTER_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY,
;   DESI_OFFLINE_MODE, DESI_ALLOW_LIVE_LLM_CALLS
;
; If no key is set anywhere, DESi runs fully OFFLINE (the default).

[openrouter]
api_key =
base_url = https://openrouter.ai/api/v1
default_small_model = ibm-granite/granite-4.1-8b
default_large_model = deepseek/deepseek-v4-pro

[openai]
api_key =
default_model =

[anthropic]
api_key =
default_model =

[local]
enabled = false
base_url =
default_model =

[desi]
offline_mode = true
allow_live_llm_calls = false
write_live_captures = false
