<script>
const I18N = {
  en:{"f_back": "← Overview", "f_foundations": "Foundations", "f_eyebrow": "The Frame · one design grammar, four domains", "f_title": "DESi is one instance of a larger idea: <span class=\"hl\">architecture over trust.</span>", "f_sub": "The router you can run is the smallest visible piece. The same design grammar runs across a knowledge protocol, a macro-economic model, and autonomous reasoning agents. This page shows how they fit — and labels honestly what is a paper, what is running code, and what is still a plan.", "f_note_k": "The through-line", "f_note_b": "Do not ask a component to be trustworthy. Build so that untrustworthiness cannot become authoritative state. Every system below is a different answer to the same question: <b>how does a system avoid failing at its own power?</b>", "f_rule_k": "The one rule", "f_rule_t": "Architecture over trust", "f_rule_s": "Five moves recur in every domain below. None is about making a part more reliable; all are about making unreliability structurally unable to win.", "f_m1_h": "Firewalls, not vigilance", "f_m1_b": "A boundary the grammar itself cannot cross: category purity in the protocol, a real-layer / synthetic-finance firewall in the economy, LLM-for-language vs rules-for-logic in the agent. The wrong kind of value is unrepresentable, not merely discouraged.", "f_m2_h": "Error history is immutable", "f_m2_b": "Nothing is deleted; a contradiction branches. Append-only, hash-chained ledgers make tampering evident. A corrected error stays in the chain forever — the record of how a belief broke is worth more than the belief.", "f_m3_h": "Invariants verified, not asserted", "f_m3_b": "Replay stability, the audit gate, the taint check, the write gate — each is re-checked at run time, and a check that cannot run is surfaced loudly rather than trusted silently. A dead guard is worse than none.", "f_m4_h": "The source is never the authority", "f_m4_b": "A paper, a forum voice, a model — all enter as sources with provenance, never as truth. Only an explicit human decision (or a deterministic rule) settles what counts. Assessability, not authority.", "f_m5_h": "Resilience is endogenous", "f_m5_b": "Stability comes not from preventing shocks but from metabolizing them. The economy's resilience capital and the agent's persona of corrected errors are structurally the same mechanism: absorbed error becomes the capacity to recover.", "f_lin_k": "The lineage", "f_lin_t": "Specifications & papers", "f_lin_s": "Three documents state the grammar — a specification and two working papers, part of a larger body on SSRN, cited and honestly preliminary.", "f_al_h": "Alexandria Protocol — the design authority", "f_al_b": "A specification for knowledge that binds itself to <b>assessability, never truth</b>: category purity (empirical / normative / model / speculative kept apart), branch-on-dissent instead of overwrite, no silent winner, an audit gate before anything becomes authoritative. Deviations elsewhere are declared against it, not hidden. <a href=\"https://ssrn.com/abstract=6395079\">Complete Edition v2.2 (SSRN)</a>.", "f_l9_h": "Layer 9 — the knowledge stack", "f_l9_b": "Semantic projection → claim identity &amp; provenance → drift and contradiction tracking → fork/merge policy → humans in roles around claims. A single claim keeps its lineage across models and time: <b>context retention is not claim continuity</b>. <a href=\"https://ssrn.com/abstract=6694758\">Working paper (SSRN)</a>.", "f_dle_h": "Dual-Layer Economy — the same grammar in macro", "f_dle_b": "A firewall between the real layer and synthetic finance made <b>structurally unrepresentable</b> in the ledger grammar; guards and projection instead of a fragile equilibrium; automatic stabilizers; and a resilience capital whose role is exactly the agent's persona — metabolized shocks, not prevented ones, enable recovery. <a href=\"https://ssrn.com/abstract=6320918\">Working paper (SSRN)</a>.", "f_inst_k": "The instantiations", "f_inst_t": "Running & built code", "f_inst_s": "The grammar is not only on paper. Here is where it runs — with an honest maturity tag on each.", "f_i1_tag": "BENCHMARKED · 38 PHASES", "f_i1_h": "DESi — the governance system", "f_i1_b": "A replay-governed epistemic governance layer for LLM research pipelines: a deterministic replay kernel, a concept gate (six conditions, lexicographic), a determinism scanner and an authority filter — measured across 38 experimental phases and 1,525 DriftBench trajectories. The runnable router is its smallest embeddable slice. <a href=\"https://ssrn.com/abstract=6846364\">Paper (SSRN)</a> · <a href=\"index.html\">run the router →</a>", "f_i2_tag": "RUNNING · EXPERIMENTAL", "f_i2_h": "Joni", "f_i2_b": "An autonomous reasoning agent whose kernel is a single-node Layer 9. Learns from sources, opens (never force-resolves) contradictions, and builds a persona from its own corrected errors. The operator settles conflicts; the agent may lodge a reasoned objection. <a href=\"https://github.com/hstre/Joni\">Repo →</a>", "f_i3_tag": "BUILT · MVP", "f_i3_h": "Hermine", "f_i3_b": "A third-party agent (Hermes, a different model family) placed under Layer 9 as its <b>sole write authority</b>: every memory or skill write is a proposal the gate disposes of, never a direct write — a concrete instance of the <a href=\"https://ssrn.com/abstract=6272258\">persistent epistemic supervisor</a>. Maturity earned through the gate, not withheld. Not yet deployed.", "f_i4_tag": "DESIGNED", "f_i4_h": "The meeting point", "f_i4_b": "Two nodes exchanging claims-with-provenance — each reading the other as a source through its own gate, neither sharing writable state. Layer 9's Phase 4, the reason the grammar exists. Designed, not yet built.", "f_hon_h": "What is claimed — and what is not", "f_hon_b": "This is a research program, not a solved problem. The papers are <b>working papers</b>; the code runs but is experimental; one agent is built and not yet deployed. No general intelligence is claimed, no breakthrough implied. The lineage — Kant on the conditions of a mature reason, Popper on conjecture and refutation — is named and held to account, not borrowed for authority. The point is modest and serious at once: systems will build their successors, and the foundations that make a mind <i>assessable</i> should be inherited, not reinvented.", "f_foot_by": "The Frame · DESi · Alexandria Protocol · Hanns-Steffen Rentschler", "f_legal": "MIT License · © 2026 Hanns-Steffen Rentschler · A design grammar across four domains. No breakthrough claimed, none implied."},
  de:{"f_back": "← Übersicht", "f_foundations": "Grundlagen", "f_eyebrow": "Der Rahmen · eine Design-Grammatik, vier Domänen", "f_title": "DESi ist eine Instanz einer größeren Idee: <span class=\"hl\">Architektur statt Vertrauen.</span>", "f_sub": "Der Router, den du starten kannst, ist das kleinste sichtbare Stück. Dieselbe Design-Grammatik trägt ein Wissensprotokoll, ein makroökonomisches Modell und autonome Reasoning-Agenten. Diese Seite zeigt, wie es zusammenpasst — und benennt ehrlich, was Paper ist, was laufender Code, und was noch Plan.", "f_note_k": "Der rote Faden", "f_note_b": "Verlange von einem Bauteil nicht, vertrauenswürdig zu sein. Baue so, dass Unzuverlässigkeit nicht zu gültigem Zustand werden kann. Jedes System unten ist eine andere Antwort auf dieselbe Frage: <b>Wie scheitert ein System nicht an seiner eigenen Macht?</b>", "f_rule_k": "Die eine Regel", "f_rule_t": "Architektur statt Vertrauen", "f_rule_s": "Fünf Züge wiederholen sich in jeder Domäne. Keiner macht ein Teil zuverlässiger; alle machen Unzuverlässigkeit strukturell chancenlos.", "f_m1_h": "Firewalls statt Wachsamkeit", "f_m1_b": "Eine Grenze, die die Grammatik selbst nicht überschreiten kann: Kategorienreinheit im Protokoll, eine Real-/Synthetik-Firewall in der Ökonomie, LLM-für-Sprache vs. Regeln-für-Logik im Agenten. Die falsche Art von Wert ist nicht unerwünscht, sondern nicht darstellbar.", "f_m2_h": "Die Fehlergeschichte ist unlöschbar", "f_m2_b": "Nichts wird gelöscht; ein Widerspruch verzweigt. Append-only, hash-verkettete Ledger machen Manipulation sichtbar. Ein korrigierter Irrtum bleibt für immer in der Kette — wie eine Überzeugung brach, ist wertvoller als die Überzeugung.", "f_m3_h": "Invarianten geprüft, nicht behauptet", "f_m3_b": "Replay-Stabilität, das Audit-Gate, die Taint-Prüfung, das Write-Gate — jede wird zur Laufzeit neu geprüft, und eine Prüfung, die nicht laufen kann, wird laut ausgewiesen statt still geglaubt. Ein toter Wächter ist schlimmer als keiner.", "f_m4_h": "Die Quelle ist nie die Autorität", "f_m4_b": "Ein Paper, eine Forumsstimme, ein Modell — alle treten als Quelle mit Provenienz ein, nie als Wahrheit. Nur eine ausdrückliche menschliche Entscheidung (oder eine deterministische Regel) settlet, was zählt. Beurteilbarkeit, nicht Autorität.", "f_m5_h": "Resilienz ist endogen", "f_m5_b": "Stabilität kommt nicht daher, Schocks zu verhindern, sondern sie zu metabolisieren. Das Resilienz-Kapital der Ökonomie und die Persona korrigierter Irrtümer des Agenten sind strukturell derselbe Mechanismus: absorbierter Fehler wird zur Fähigkeit, sich zu erholen.", "f_lin_k": "Die Herkunft", "f_lin_t": "Spezifikationen & Paper", "f_lin_s": "Drei Dokumente formulieren die Grammatik — eine Spezifikation und zwei Working Paper, Teil eines größeren Werks auf SSRN, zitiert und ehrlich vorläufig.", "f_al_h": "Alexandria-Protokoll — die Design-Autorität", "f_al_b": "Eine Wissens-Spezifikation, die sich an <b>Beurteilbarkeit bindet, nie an Wahrheit</b>: Kategorienreinheit (empirisch / normativ / Modell / spekulativ getrennt), Verzweigen-bei-Dissens statt Überschreiben, kein stiller Gewinner, ein Audit-Gate, bevor etwas autoritativ wird. Abweichungen anderswo werden dagegen deklariert, nicht versteckt. <a href=\"https://ssrn.com/abstract=6395079\">Complete Edition v2.2 (SSRN)</a>.", "f_l9_h": "Layer 9 — der Wissens-Stack", "f_l9_b": "Semantische Projektion → Claim-Identität &amp; Provenienz → Drift- und Widerspruchs-Verfolgung → Fork/Merge-Politik → Menschen in Rollen um Claims. Ein einzelner Claim behält seine Herkunft über Modelle und Zeit: <b>context retention is not claim continuity</b>. <a href=\"https://ssrn.com/abstract=6694758\">Working Paper (SSRN)</a>.", "f_dle_h": "Dual-Layer Economy — dieselbe Grammatik im Makro", "f_dle_b": "Eine Firewall zwischen Real-Layer und synthetischer Finanz, in der Ledger-Grammatik <b>strukturell nicht darstellbar</b>; Guards und Projektion statt fragilem Gleichgewicht; automatische Stabilisatoren; und ein Resilienz-Kapital, dessen Rolle genau die Persona des Agenten ist — metabolisierte, nicht verhinderte Schocks ermöglichen Erholung. <a href=\"https://ssrn.com/abstract=6320918\">Working Paper (SSRN)</a>.", "f_inst_k": "Die Instanzen", "f_inst_t": "Laufender & gebauter Code", "f_inst_s": "Die Grammatik steht nicht nur auf Papier. Hier läuft sie — jede mit ehrlichem Reifegrad.", "f_i1_tag": "BENCHMARKT · 38 PHASEN", "f_i1_h": "DESi — das Governance-System", "f_i1_b": "Eine replay-governte epistemische Governance-Schicht für LLM-Forschungspipelines: ein deterministischer Replay-Kernel, ein Concept-Gate (sechs Bedingungen, lexikographisch), ein Determinismus-Scanner und ein Authority-Filter — gemessen über 38 experimentelle Phasen und 1.525 DriftBench-Trajektorien. Der lauffähige Router ist ihr kleinstes einbettbares Stück. <a href=\"https://ssrn.com/abstract=6846364\">Paper (SSRN)</a> · <a href=\"index.html\">Router starten →</a>", "f_i2_tag": "LÄUFT · EXPERIMENTELL", "f_i2_h": "Joni", "f_i2_b": "Ein autonomer Reasoning-Agent, dessen Kernel ein Ein-Knoten-Layer-9 ist. Lernt aus Quellen, öffnet Widersprüche (löst sie nie zwangsweise) und baut eine Persona aus seinen eigenen korrigierten Irrtümern. Der Betreiber settlet Konflikte; der Agent darf begründet widersprechen. <a href=\"https://github.com/hstre/Joni\">Repo →</a>", "f_i3_tag": "GEBAUT · MVP", "f_i3_h": "Hermine", "f_i3_b": "Ein fremder Agent (Hermes, andere Modellfamilie) unter Layer 9 als <b>alleiniger Schreibautorität</b>: jeder Memory- oder Skill-Schreibversuch ist ein Vorschlag, über den das Gate entscheidet, nie ein direkter Write — eine konkrete Instanz des <a href=\"https://ssrn.com/abstract=6272258\">persistenten epistemischen Supervisors</a>. Mündigkeit wird durchs Gate verdient, nicht vorenthalten. Noch nicht deployt.", "f_i4_tag": "ENTWORFEN", "f_i4_h": "Der Begegnungspunkt", "f_i4_b": "Zwei Knoten, die Claims-mit-Provenienz austauschen — jeder liest den anderen als Quelle durch sein eigenes Gate, keiner teilt beschreibbaren Zustand. Layer 9 Phase 4, der Grund, warum es die Grammatik gibt. Entworfen, noch nicht gebaut.", "f_hon_h": "Was behauptet wird — und was nicht", "f_hon_b": "Das ist ein Forschungsprogramm, kein gelöstes Problem. Die Paper sind <b>Working Paper</b>; der Code läuft, ist aber experimentell; ein Agent ist gebaut und noch nicht deployt. Keine allgemeine Intelligenz wird behauptet, kein Durchbruch angedeutet. Die Herkunft — Kant zu den Bedingungen einer mündigen Vernunft, Popper zu Vermutung und Widerlegung — wird benannt und zur Rechenschaft gehalten, nicht für Autorität geborgt. Der Punkt ist bescheiden und ernst zugleich: Systeme werden ihre Nachfolger bauen, und die Grundlagen, die einen Verstand <i>beurteilbar</i> machen, sollten geerbt werden, nicht neu erfunden.", "f_foot_by": "Der Rahmen · DESi · Alexandria-Protokoll · Hanns-Steffen Rentschler", "f_legal": "MIT-Lizenz · © 2026 Hanns-Steffen Rentschler · Eine Design-Grammatik über vier Domänen. Kein Durchbruch behauptet, keiner angedeutet."}
};

function applyLang(lang){
  const dict = I18N[lang] || I18N.en;
  document.documentElement.lang = (I18N[lang] ? lang : "en");
  document.body.className = "lang-" + (I18N[lang] ? lang : "en");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n"); if(dict[k]!==undefined) el.textContent = dict[k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{
    const k = el.getAttribute("data-i18n-html"); if(dict[k]!==undefined) el.innerHTML = dict[k];
  });
  document.querySelectorAll(".langs button").forEach(b=>{
    b.classList.toggle("active", b.getAttribute("data-lang")===lang);
  });
  try{ localStorage.setItem("desi_lang", lang); }catch(e){}
}
document.getElementById("langs").addEventListener("click", e=>{
  const b = e.target.closest("button[data-lang]"); if(b) applyLang(b.getAttribute("data-lang"));
});
(function init(){
  let lang=""; try{ lang = localStorage.getItem("desi_lang")||""; }catch(e){}
  if(lang!=="en" && lang!=="de"){ const n=(navigator.language||"en").slice(0,2).toLowerCase(); lang=(n==="de")?"de":"en"; }
  applyLang(lang);
})();
</script>
