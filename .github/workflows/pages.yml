name: Deploy advertising site to GitHub Pages

# Publishes the multilingual DESi advertising site (website/) to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".

on:
  push:
    branches:
      - claude/desi-advertising-website-RchDf
      - main
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (build type: GitHub Actions) on first run,
          # so no manual Settings -> Pages step is required.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
