name: RULER A/B benchmark

on:
  workflow_dispatch:
    inputs:
      parallelism:
        description: 'Concurrent API calls'
        required: false
        default: '4'

jobs:
  ruler:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow huggingface_hub

      - name: Verify secrets are set (no values leaked)
        run: |
          [ -n "$DEEPSEEK_API_KEY" ] && echo "DEEPSEEK_API_KEY: SET (length $(echo -n $DEEPSEEK_API_KEY | wc -c))" || (echo "DEEPSEEK_API_KEY MISSING"; exit 1)
          [ -n "$OPENROUTER_API_KEY" ] && echo "OPENROUTER_API_KEY: SET (length $(echo -n $OPENROUTER_API_KEY | wc -c))" || (echo "OPENROUTER_API_KEY MISSING"; exit 1)
          [ -n "$HF_TOKEN" ] && echo "HF_TOKEN: SET (length $(echo -n $HF_TOKEN | wc -c))" || echo "HF_TOKEN: not set (downloads will be anonymous, still works for public datasets)"
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run RULER A/B
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python ab_evidence/ruler_run.py

      - name: Analyze results
        run: |
          python ab_evidence/ruler_analyze.py

      - name: Show summary
        run: |
          echo "=== RULER Summary ==="
          cat ab_evidence/results/ruler_bench_summary.json
          echo ""
          echo "=== RULER Report ==="
          cat ab_evidence/reports/ruler_bench_report.md

      - name: Commit per-item results back to branch
        if: success()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ab_evidence/results/ruler_bench/items/*.json 2>/dev/null || true
          git add ab_evidence/results/ruler_bench_summary.json 2>/dev/null || true
          git add ab_evidence/reports/ruler_bench_report.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit (resume-safety: items already in tree)."
          else
            git commit -m "RULER per-item results (workflow run #${{ github.run_number }})"
            # Push with rebase-retry loop to survive concurrent pushes from sibling workflows
            for i in 1 2 3 4 5; do
              if git push origin HEAD:${{ github.ref_name }}; then
                echo "Pushed successfully on attempt $i"
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push), rebasing..."
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }} || { echo "Rebase failed, aborting"; git rebase --abort; exit 1; }
              sleep $((2 ** i))
            done
            echo "Failed to push after 5 attempts"
            exit 1
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruler-results
          path: |
            ab_evidence/results/ruler_bench/
            ab_evidence/results/ruler_bench_summary.json
            ab_evidence/reports/ruler_bench_report.md
          retention-days: 30
