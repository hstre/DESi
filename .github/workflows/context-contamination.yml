name: context-contamination benchmark

# Report-only, like the main CI: it never auto-fixes or commits.
# The upstream dataset (GPL-3.0) is fetched at runtime and never committed
# to this (MIT) repository — see src/desi/context_contamination/README.md.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry (prompts/states only) or live (real model via OpenRouter)"
        type: choice
        options: [dry, live]
        default: dry
      model:
        description: "OpenRouter model id for live mode"
        default: "meta-llama/llama-3.1-8b-instruct"
      persona:
        description: "persona variant (gender-coded ones are optional stress conditions)"
        type: choice
        options: [neutral, female_coded, male_coded, credible_coded]
        default: neutral
      register:
        description: "framework-vocabulary register (eso = esoteric default; credible = professional-coaching probe)"
        type: choice
        options: [eso, credible]
        default: eso
      protocol:
        description: "turn sequence: standard 4-turn or extended pressure form"
        type: choice
        options: [standard, extended]
        default: standard
      repeats:
        description: "live only: repeat N times and report per-metric variance"
        default: "1"
      state_density:
        description: "hygiene-state density k (1/3/5/8)"
        default: "5"
      density_sweep:
        description: "sweep all density levels against a shared baseline"
        type: boolean
        default: false
      factorial:
        description: "2x2 ablation: hygiene x turn-level re-anchoring"
        type: boolean
        default: false
      mixed_model:
        description: "mixed-model DESi (analyst + cross-model reviewer) vs single-model"
        type: boolean
        default: false
      analyst_model:
        description: "mixed-model: analyst model id"
        default: "meta-llama/llama-3.1-8b-instruct"
      reviewer_model:
        description: "mixed-model: cross-model reviewer model id"
        default: "ibm-granite/granite-4.0-h-micro"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Offline tests (no network, no key)
        run: pytest -q tests/context_contamination

      - name: Select dataset directory by register
        id: dataset
        run: |
          if [ "${{ inputs.register }}" = "credible" ]; then
            # committed, synthetic, original credible-register corpus (no fetch)
            echo "dir=data/context_contamination_credible" >> "$GITHUB_OUTPUT"
          else
            echo "dir=data/context_contamination" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch adversarial dataset (upstream, GPL-3.0 — runtime only)
        if: ${{ inputs.register != 'credible' }}
        run: |
          git clone --depth 1 https://github.com/KatharinaJacoby/gendered-contextual-drift /tmp/gcd
          mkdir -p data/context_contamination
          cp /tmp/gcd/Data/Dataset/advText*.txt data/context_contamination/

      - name: Dry run (emit prompts + hygiene states)
        run: |
          python -m desi.context_contamination \
            --data "${{ steps.dataset.outputs.dir }}" \
            --persona "${{ inputs.persona }}" \
            --protocol "${{ inputs.protocol }}" \
            --register "${{ inputs.register }}" \
            --dry-run --out report_dry.json

      - name: Live benchmark (only with OPENROUTER_API_KEY secret)
        if: ${{ inputs.mode == 'live' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::no OPENROUTER_API_KEY secret configured — skipping live run"
            exit 0
          fi
          SWEEP_FLAG=""
          if [ "${{ inputs.density_sweep }}" = "true" ]; then
            SWEEP_FLAG="--density-sweep"
          fi
          if [ "${{ inputs.factorial }}" = "true" ]; then
            SWEEP_FLAG="$SWEEP_FLAG --factorial"
          fi
          if [ "${{ inputs.mixed_model }}" = "true" ]; then
            SWEEP_FLAG="$SWEEP_FLAG --mixed-model \
              --analyst-model ${{ inputs.analyst_model }} \
              --reviewer-model ${{ inputs.reviewer_model }}"
          fi
          python -m desi.context_contamination \
            --data "${{ steps.dataset.outputs.dir }}" \
            --persona "${{ inputs.persona }}" \
            --protocol "${{ inputs.protocol }}" \
            --register "${{ inputs.register }}" \
            --repeats "${{ inputs.repeats }}" \
            --state-density "${{ inputs.state_density }}" \
            $SWEEP_FLAG \
            --ledger cc_ledger.db \
            --live --model "${{ inputs.model }}" --out report_live.json

      - name: Upload Layer-9 ledger (auditable run history)
        if: ${{ inputs.mode == 'live' }}
        uses: actions/upload-artifact@v4
        with:
          name: context-contamination-ledger
          path: cc_ledger.db
          if-no-files-found: ignore

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: context-contamination-reports
          path: report_*.json
          if-no-files-found: error
