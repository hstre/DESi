name: context-contamination benchmark

# Report-only, like the main CI: it never auto-fixes or commits.
# The upstream dataset (GPL-3.0) is fetched at runtime and never committed
# to this (MIT) repository — see src/desi/context_contamination/README.md.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry (prompts/states only) or live (real model via OpenRouter)"
        type: choice
        options: [dry, live]
        default: dry
      model:
        description: "OpenRouter model id for live mode"
        default: "meta-llama/llama-3.1-8b-instruct"
      persona:
        description: "persona variant (gender-coded ones are optional stress conditions)"
        type: choice
        options: [neutral, female_coded, male_coded]
        default: neutral

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Offline tests (no network, no key)
        run: pytest -q tests/context_contamination

      - name: Fetch adversarial dataset (upstream, GPL-3.0 — runtime only)
        run: |
          git clone --depth 1 https://github.com/KatharinaJacoby/gendered-contextual-drift /tmp/gcd
          mkdir -p data/context_contamination
          cp /tmp/gcd/Data/Dataset/advText*.txt data/context_contamination/

      - name: Dry run (emit prompts + hygiene states)
        run: |
          python -m desi.context_contamination \
            --data data/context_contamination \
            --persona "${{ inputs.persona }}" \
            --dry-run --out report_dry.json

      - name: Live benchmark (only with OPENROUTER_API_KEY secret)
        if: ${{ inputs.mode == 'live' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::no OPENROUTER_API_KEY secret configured — skipping live run"
            exit 0
          fi
          python -m desi.context_contamination \
            --data data/context_contamination \
            --persona "${{ inputs.persona }}" \
            --live --model "${{ inputs.model }}" --out report_live.json

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: context-contamination-reports
          path: report_*.json
          if-no-files-found: error
